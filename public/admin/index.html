<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PFO admin</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <style>
    .pfo-no-access {
      max-width: 540px;
      margin: 80px auto;
      padding: 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #1b3b62;
      line-height: 1.5;
    }
    .pfo-no-access h1 { font-size: 24px; margin: 0 0 12px; }
    .pfo-no-access p  { color: #4a4a4a; margin: 0 0 12px; }
    .pfo-no-access a  { color: #1b3b62; }
    .pfo-no-access button {
      margin-top: 16px;
      padding: 10px 20px;
      background: #1b3b62;
      color: #fff;
      border: 0;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Don't let Decap auto-init: we need to read the user's roles
       before deciding which collections to show them. -->
  <script>window.CMS_MANUAL_INIT = true;</script>

  <!-- Netlify Identity widget — required for the login flow. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- YAML parser so we can read /admin/config.yml at runtime and
       hand a filtered version to Decap. ~50KB, gzipped much less. -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <!-- Decap CMS itself. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
  /* ────────────────────────────────────────────────────────────────
     PFO role-based collection access
     ────────────────────────────────────────────────────────────────
     Each Netlify Identity user can have one or more roles assigned
     in their user_metadata. This script reads those roles on login
     and starts the CMS with a config that only contains the
     collections the user is allowed to edit.

     Roles → collections map:
       admin          → everything (incl. site settings)
       events         → /events
       news           → /news
       maps           → /maps
       info           → /information (info pages)
       announcements  → homepage banners

     A user with no roles assigned sees a "no access yet" page.
     A user with multiple roles sees the union of their collections.

     This is UI-level gating. A determined user with browser dev tools
     could bypass it. PFO's committee model is trust-based, so that's
     acceptable; if stricter enforcement is ever needed, we'd move to
     a CMS with backend RBAC.
     ──────────────────────────────────────────────────────────────── */

  const ROLE_TO_COLLECTIONS = {
    admin:         null,                    // null = sees all collections
    events:        ['events'],
    news:          ['news'],
    maps:          ['maps'],
    info:          ['infoPages'],
    announcements: ['announcements'],
  };

  // Site-wide settings (page hero photos etc) — admins only.
  const ADMIN_ONLY = new Set(['site-settings']);

  function allowedCollectionsFor(roles) {
    if (!Array.isArray(roles) || roles.length === 0) return [];
    if (roles.includes('admin')) return null;  // sentinel for "all"
    const allowed = new Set();
    for (const role of roles) {
      const cols = ROLE_TO_COLLECTIONS[role];
      if (cols === null) return null;          // any role mapped to all
      if (Array.isArray(cols)) cols.forEach(c => allowed.add(c));
    }
    return [...allowed];
  }

  function filterConfig(config, roles) {
    const allowed = allowedCollectionsFor(roles);
    if (allowed === null) return config;       // admin / all access
    const filtered = JSON.parse(JSON.stringify(config));
    filtered.collections = filtered.collections.filter(c => {
      if (ADMIN_ONLY.has(c.name)) return false;
      return allowed.includes(c.name);
    });
    return filtered;
  }

  function showNoAccessMessage() {
    document.body.innerHTML = `
      <div class="pfo-no-access">
        <h1>No collections assigned to your account</h1>
        <p>You're logged in, but the Secretary hasn't yet granted you
           permission to edit any specific section of the site (Events,
           News, Maps, Information pages or Announcements).</p>
        <p>Drop them an email and they'll set this up in a couple of
           minutes from the Netlify dashboard.</p>
        <button onclick="netlifyIdentity.logout(); location.reload();">
          Log out and try a different account
        </button>
      </div>
    `;
  }

  function startCMS(user) {
    fetch('/admin/config.yml', { cache: 'no-store' })
      .then(r => r.text())
      .then(yamlText => {
        const config = jsyaml.load(yamlText);
        // Check both metadata locations. Netlify's built-in "Roles"
        // field in the Identity admin UI writes to app_metadata.roles
        // (admin-only, more secure). user_metadata.roles is editable
        // by the user themselves. Either source is fine for our use.
        const appRoles  = (user && user.app_metadata  && user.app_metadata.roles)  || [];
        const userRoles = (user && user.user_metadata && user.user_metadata.roles) || [];
        const roles = [...new Set([...appRoles, ...userRoles])];
        const filtered = filterConfig(config, roles);

        if (filtered.collections.length === 0) {
          showNoAccessMessage();
          return;
        }
        // Hand Decap a complete config (load_config_file:false stops
        // it re-fetching config.yml and overwriting our filtered one).
        filtered.load_config_file = false;
        CMS.init({ config: filtered });
      })
      .catch(err => {
        console.error('[PFO admin] role-filter bootstrap failed:', err);
        // Fall back so people aren't locked out by a runtime error.
        CMS.init();
      });
  }

  if (window.netlifyIdentity) {
    netlifyIdentity.on('init', user => {
      if (user) {
        startCMS(user);
      } else {
        // Show the login modal. After login the 'login' event fires
        // and we'll start the CMS with the right roles.
        netlifyIdentity.on('login', startCMS);
        netlifyIdentity.open();
      }
    });
    netlifyIdentity.on('logout', () => location.reload());
  } else {
    // No Identity widget loaded? Init the CMS the default way so the
    // page doesn't break.
    CMS.init();
  }
  </script>
</body>
</html>
