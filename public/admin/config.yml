# ─────────────────────────────────────────────────────────────────────────────
# Decap CMS configuration for Pendle Forest Orienteers
#
# Edits made in the admin UI commit directly to the GitHub repo via Netlify's
# Git Gateway. Netlify rebuilds and the live site updates within ~30 seconds.
#
# Committee members log in by email invitation (sent from the Netlify dashboard).
# No Git knowledge or developer tools required.
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main
  squash_merges: true

# Drafts go through an editorial workflow — Save as draft → Ready → Publish.
# This lets editors save in-progress edits without publishing them live.
publish_mode: editorial_workflow

# Where uploaded media (event photos, map images, news heroes) lives in the repo
media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

# Show a friendlier site logo on the login screen
logo_url: /assets/logo.svg
site_url: https://pfo.org.uk

# ─────────────────────────────────────────────────────────────────────────────
# COLLECTIONS
# Each collection maps to a content collection in src/content/
# ─────────────────────────────────────────────────────────────────────────────
collections:

  # ─── SITE SETTINGS ───────────────────────────────────────────────────────
  # Singletons — shared site-wide config the committee can edit. Currently:
  # the hero photo for each top-level page.
  - name: "site-settings"
    label: "Site settings"
    description: "Photos and shared text used across the site. Hero photos can be left blank for a plain text-only header."
    files:
      - name: "page-heroes"
        label: "Page hero photos"
        file: "src/data/page-heroes.json"
        description: "The big photo at the top of each page. Click 'Browse' on each Image field to upload a new one or pick from already-uploaded photos."
        fields:
          - name: "home"
            label: "Home page hero"
            widget: "object"
            collapsed: false
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false, hint: "1600×900 or larger; landscape orientation works best" }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false, hint: "Describe the image for screen readers" }
          - name: "events"
            label: "Events page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "maps"
            label: "Mapped areas page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "newcomers"
            label: "Newcomers page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "training"
            label: "Training page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "membership"
            label: "Membership page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "about"
            label: "About page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "contacts"
            label: "Contacts page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "news"
            label: "News page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }
          - name: "information"
            label: "Information page hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "image", label: "Image",     widget: "image",  required: false }
              - { name: "alt",   label: "Alt text",  widget: "string", required: false }

      - name: "newcomers-text"
        label: "Newcomers page text"
        file: "src/data/newcomers-text.json"
        description: "Every word on the /newcomers page. Sections match the page layout — Hero, How it works, What to bring, Your first event, Coming up, FAQ. Inline links can be added in body fields using markdown like [click here](/somewhere)."
        fields:
          - name: "hero"
            label: "Hero (top of the page)"
            widget: "object"
            collapsed: false
            fields:
              - { name: "eyebrow",          label: "Eyebrow (above the heading)", widget: "string", hint: "e.g. 'For newcomers'" }
              - { name: "heading",          label: "Heading",                     widget: "string" }
              - { name: "lede",             label: "Intro paragraph",             widget: "text" }
              - { name: "primaryCtaLabel",  label: "Primary button label",        widget: "string" }
              - { name: "primaryCtaUrl",    label: "Primary button link",         widget: "string", hint: "e.g. /events" }
              - { name: "secondaryCtaLabel",label: "Secondary button label",      widget: "string" }
              - { name: "secondaryCtaUrl",  label: "Secondary button link",       widget: "string", hint: "e.g. #faq" }
          - name: "howItWorks"
            label: "How it works (3-column block)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "items"
                label: "Items (3 cards)"
                widget: "list"
                summary: "{{fields.title}}"
                hint: "Three columns shown side by side. You can add or remove items, but 3 looks best."
                fields:
                  - { name: "title", label: "Card title", widget: "string", hint: "e.g. '1. The map'" }
                  - { name: "body",  label: "Card body",  widget: "text" }
          - name: "whatToBring"
            label: "What to bring (6-card grid)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "items"
                label: "Kit items"
                widget: "list"
                summary: "{{fields.title}}"
                hint: "Each item is a card. Reorder by dragging; add or remove items freely."
                fields:
                  - { name: "title", label: "Item title", widget: "string", hint: "e.g. 'Footwear'" }
                  - { name: "body",  label: "Description", widget: "text" }
          - name: "yourFirstEvent"
            label: "Your first event (numbered steps)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "steps"
                label: "Steps"
                widget: "list"
                summary: "{{fields.lead}}"
                hint: "Each step has a bold lead-in followed by a longer explanation. Body supports markdown for links."
                fields:
                  - { name: "lead", label: "Bold lead-in", widget: "string", hint: "Shown in bold at the start of each step, e.g. 'Find an event near you'" }
                  - { name: "body", label: "Rest of the sentence", widget: "text", hint: "The text that follows the bold lead-in. Use markdown for inline links, e.g. on the [events page](/events)." }
          - name: "comingUp"
            label: "Coming up (auto-populated event cards)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "heading", label: "Heading", widget: "string", hint: "The 3 event cards below are pulled in automatically from upcoming events." }
          - name: "faq"
            label: "FAQ (expandable questions)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "items"
                label: "Questions"
                widget: "list"
                summary: "{{fields.question}}"
                hint: "Each one is a collapsible question/answer. Add, remove, or reorder freely. Answers support markdown for inline links."
                fields:
                  - { name: "question", label: "Question", widget: "string" }
                  - { name: "answer",   label: "Answer",   widget: "text", hint: "Use markdown for inline links, e.g. [More on membership](/membership)." }

      - name: "committee"
        label: "Committee members"
        file: "src/data/committee.json"
        description: "Names, roles, photos and the routing email for each committee member. Photos shown on the Contacts page; emails are never visible on the public site, they're only used to forward contact-form submissions."
        fields:
          - name: "members"
            label: "Members"
            widget: "list"
            summary: "{{fields.name}} — {{fields.roles}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - name: "roles"
                label: "Roles"
                widget: "list"
                field: { name: "role", label: "Role", widget: "string" }
                hint: "One per row, e.g. Chair, Treasurer, Coach."
              - { name: "photo", label: "Photo", widget: "image", required: false, hint: "Optional. Square-ish portrait works best. Leave blank for a circle with initials." }
              - { name: "email", label: "Routing email", widget: "string", hint: "Where contact-form submissions for this person go. Never shown publicly." }

  # ─── EVENTS ──────────────────────────────────────────────────────────────
  - name: "events"
    label: "Events"
    label_singular: "Event"
    description: "Upcoming and past events. The site shows events with a future entry close date as 'upcoming' and past ones as 'results'."
    folder: "src/content/events"
    create: true
    delete: true
    slug: "{{slug}}-{{year}}-{{month}}-{{day}}"
    summary: "{{title}} — {{year}}-{{month}}-{{day}}"
    sort: "date:desc"
    # Per-event upload folder. Files uploaded while editing an event land
    # in /public/results-archive/{year}/{slug}/ where {slug} is the event's
    # full slug e.g. "brun-valley-2026-05-15". Filenames can stay as their
    # SI Timing defaults (index.html, index_clubresults.html, etc) because
    # they're in a unique folder. Relative links inside the HTML files keep
    # working because both files share the same folder.
    media_folder: "../../../public/results-archive/{{year}}/{{slug}}"
    public_folder: "/results-archive/{{year}}/{{slug}}"
    fields:
      - { name: "title", label: "Event title", widget: "string", hint: "e.g. 'Ightenhill South Urban' — short, no format suffix" }
      - { name: "date", label: "Event date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "startTime", label: "Start time", widget: "string", required: false, hint: "e.g. '7:00pm' or '10:30am' (display only, not parsed)" }
      - { name: "entryCloseDate", label: "Entry close date / time", widget: "datetime", picker_utc: false, hint: "When entries close. Drives the auto-transition from upcoming to results." }
      - { name: "location", label: "Location", widget: "string", hint: "Short label for cards, e.g. 'Burnley'" }
      - { name: "venue", label: "Venue", widget: "string", required: false, hint: "Specific building, e.g. 'Ighten Leigh Social Club'" }
      - { name: "postcode", label: "Postcode", widget: "string", required: false }
      # ─── Location: pick ONE method, then fill in just that section ──
      # The dropdown below tells the website which input to read, so the
      # event can't accidentally have two conflicting locations. Only the
      # field matching your choice will be used — the other is ignored.
      - name: "coordsMethod"
        label: "How are you setting the location?"
        widget: "select"
        default: "paste"
        options:
          - { label: "Paste coordinates from Google Maps (recommended — fast & accurate)", value: "paste" }
          - { label: "Drop a pin on the OpenStreetMap picker below", value: "pin" }
        hint: "Pick one. Only fill in the matching field below — the other will be ignored when the page builds."
      - { name: "coordsPaste", label: "Coordinates from Google Maps", widget: "string", required: false, hint: "Use this if you chose 'Paste coordinates' above. On Google Maps: right-click the venue, then click the numbers at the top of the menu (e.g. 53.79748, -2.22698). They auto-copy. Paste here." }
      - name: "coordsGeoJson"
        label: "Pin on the map"
        widget: "map"
        required: false
        type: "Point"
        decimals: 7
        hint: "Use this if you chose 'Drop a pin' above. Pan/zoom to East Lancashire, then click to drop a pin at the venue. Drag the pin to fine-tune. (Map shows OpenStreetMap — Google Maps tiles aren't free.)"
      - { name: "what3words", label: "what3words", widget: "string", required: false, hint: "Three-word location for parking / event centre, e.g. 'typically.capacity.skips' (no leading slashes)" }
      - { name: "gridRef", label: "OS grid reference", widget: "string", required: false, hint: "e.g. 'SD848335'" }
      - name: "format"
        label: "Format"
        widget: "select"
        options:
          - "Standard"
          - "Score"
          - "Urban"
          - "Urban Score"
          - "Street-O"
          - "Snook-O"
          - "Snook-O/Ratchet"
          - "Sprint"
          - "Night-O"
          - "Regional"
          - "MTBO"
          - "Training"
        default: "Standard"
      - name: "level"
        label: "Event level"
        widget: "select"
        options:
          - { label: "Local", value: "local" }
          - { label: "Regional", value: "regional" }
          - { label: "National", value: "national" }
          - { label: "Major", value: "major" }
        default: "local"
      - { name: "series", label: "Series name", widget: "string", required: false, hint: "Optional series this event belongs to, e.g. 'May Street-O'" }
      - { name: "bofEventNumber", label: "BOF event number", widget: "string", required: true, hint: "British Orienteering event ID, e.g. '87374'. If the event hasn't been registered with BO yet and a number hasn't been assigned, enter 'TBC' — you can come back and edit it once the number is allocated." }
      - name: "dogsAllowed"
        label: "Dog policy"
        widget: "select"
        required: false
        options:
          - { label: "(not specified)", value: "" }
          - { label: "Dogs welcome",          value: "yes" }
          - { label: "Dogs on lead only",     value: "on-lead" }
          - { label: "Dogs not permitted",    value: "no" }
          - { label: "Not recommended (e.g. urban / Street-O)", value: "not-recommended" }
      - { name: "dogNotes", label: "Dog policy — extra notes", widget: "text", required: false, hint: "Optional explanation, e.g. 'Taking dogs on urban courses is not recommended due to the traffic hazard.' Renders next to the dropdown answer." }
      # ─── Officials (optional)
      - { name: "planner",          label: "Planner",          widget: "string", required: false, hint: "e.g. 'Richard Edwards (PFO)'" }
      - { name: "controller",       label: "Controller",       widget: "string", required: false, hint: "Required for regional+ events. e.g. 'Steve Wilson (PFO)'" }
      - { name: "seriesOrganiser",  label: "Series organiser", widget: "string", required: false, hint: "e.g. 'Kay Hawke (PFO)'" }
      - { name: "entryFee", label: "Entry fee", widget: "string", required: false, hint: "Free-text, e.g. 'From £6' or '£6 / £8 pair / £9 trio'" }
      - { name: "capacity", label: "Entry cap", widget: "number", required: false, value_type: "int", min: 0 }
      - { name: "siEntriesUrl", label: "SI Entries URL", widget: "string", required: false, hint: "Direct link to the entry form for this event on sientries.co.uk" }
      - { name: "routeGadgetUrl", label: "RouteGadget URL", widget: "string", required: false }
      - { name: "summary", label: "Card subtitle", widget: "string", hint: "1-line subtitle shown on cards, e.g. 'Score event · Burnley · Local level'" }
      - { name: "description", label: "Hero description", widget: "text", required: false, hint: "1-2 sentences for the homepage featured-event card. Optional." }
      - { name: "heroImage", label: "Hero photo", widget: "image", required: false, hint: "Optional banner photo shown across the top of the event page." }
      - { name: "heroImageAlt", label: "Hero photo alt text", widget: "string", required: false, hint: "Optional. Short description for screen readers." }
      - name: "results"
        label: "Results files"
        widget: "list"
        required: false
        summary: "{{fields.label}} ({{fields.type}})"
        fields:
          - { name: "label", label: "File label", widget: "string", hint: "e.g. 'Full results', 'Splits', 'RouteGadget'" }
          - { name: "url", label: "Results file or URL", widget: "file", choose_url: true, hint: "Click to pick a file from the Media Library, or click 'Insert from URL' to paste an external link (e.g. RouteGadget)." }
          - { name: "hidden", label: "Hide this entry from the public site", widget: "boolean", default: false, required: false, hint: "Tick to temporarily hide this single results file (e.g. while corrections are being made). The entry stays in the CMS." }
          - name: "type"
            label: "File type"
            widget: "select"
            options:
              - { label: "HTML / web page", value: "html" }
              - { label: "PDF", value: "pdf" }
              - { label: "Excel (.xlsx)", value: "xlsx" }
              - { label: "CSV", value: "csv" }
      - { name: "disclaimerOverride", label: "Override the standard disclaimer for this event", widget: "boolean", default: false, required: false, hint: "Leave this UNTICKED on every normal event. When unticked, the standard club-wide disclaimer (British Orienteering insurance notice) appears in the yellow box. Tick this ONLY when you want to replace the standard wording with your own bespoke text below — e.g. unusual terrain hazards, parking rules, weather caveats. When ticked, the box below is what appears; the standard wording will NOT be shown." }
      - name: "disclaimer"
        label: "Custom disclaimer text (only used when override is ticked)"
        widget: "markdown"
        required: false
        hint: "Only used if 'Override the standard disclaimer' is ticked above. When override is unticked this box is ignored — leave it blank or save notes here for future reference, either way it won't appear on the website."
      - { name: "report", label: "Event report (post-event)", widget: "markdown", required: false, hint: "Filled in after the event. Lost property, organiser's comments, planner's comments, photos. When you save anything here, a 'Report' button appears next to the results on the event page, linking to a separate page that displays this content." }
      - { name: "cancelled", label: "Event cancelled", widget: "boolean", default: false, required: false, hint: "Tick this if the event was supposed to happen but isn't anymore. The event still appears on the site, marked 'Cancelled'." }
      - { name: "hidden", label: "Hide from public site", widget: "boolean", default: false, required: false, hint: "Tick this to remove this event from every public page (homepage, events list, calendar, RSS) without deleting it. Use this for test entries or events not ready for the public yet — much safer than the trash icon." }
      - { name: "notes", label: "Committee notes", widget: "text", required: false, hint: "Private notes, not shown publicly" }
      - { name: "body", label: "Long-form description", widget: "markdown", required: false, hint: "Full event details, course information, parking notes, etc." }
      - name: "attachments"
        label: "File attachments"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        hint: "Course details, briefing notes, parking maps, entry forms — anything visitors should be able to download from this event's page. Each attachment becomes a labelled link at the bottom of the event body."
        fields:
          - { name: "label", label: "Label shown to readers", widget: "string", hint: "E.g. 'Course details (PDF)' or 'Final entry list'" }
          - { name: "file", label: "Upload file", widget: "file" }
          - name: "type"
            label: "File type"
            widget: "select"
            options:
              - { label: "PDF", value: "pdf" }
              - { label: "Word document", value: "docx" }
              - { label: "Spreadsheet", value: "xlsx" }
              - { label: "CSV", value: "csv" }
              - { label: "Image", value: "image" }
              - { label: "Other", value: "other" }
            default: "pdf"
            required: false
      - name: "gallery"
        label: "Photo gallery (after the event)"
        widget: "list"
        required: false
        summary: "{{fields.alt}}"
        hint: "Photos taken at the event. Appears as a responsive grid at the bottom of the event page. Add as many as you like — phones tend to make 6–12 a comfortable batch."
        fields:
          - { name: "src",     label: "Photo",       widget: "image" }
          - { name: "alt",     label: "Alt text",    widget: "string", required: false, hint: "Optional. Short description for screen readers, e.g. 'Runners at the start of the long course'." }
          - { name: "caption", label: "Caption",     widget: "string", required: false, hint: "Optional caption shown under the photo." }

  # ─── NEWS ────────────────────────────────────────────────────────────────
  - name: "news"
    label: "News"
    label_singular: "News article"
    description: "Race reports, club announcements and news."
    folder: "src/content/news"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{year}}-{{month}}-{{day}}"
    sort: "date:desc"
    fields:
      - { name: "title", label: "Headline", widget: "string" }
      - { name: "date", label: "Publish date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "summary", label: "Summary / standfirst", widget: "text", hint: "1-2 sentences shown on cards and listings." }
      - { name: "heroImage", label: "Hero image", widget: "image", required: false }
      - { name: "heroImageAlt", label: "Hero image alt text", widget: "string", required: false, hint: "Describe the image for screen readers." }
      - { name: "author", label: "Author", widget: "string", required: false }
      - name: "gallery"
        label: "Photo gallery"
        widget: "list"
        required: false
        summary: "{{fields.alt}}"
        fields:
          - { name: "src", label: "Image", widget: "image" }
          - { name: "alt", label: "Alt text", widget: "string", required: false, hint: "Optional. Short description for screen readers." }
          - { name: "caption", label: "Caption", widget: "string", required: false }
      - name: "attachments"
        label: "File attachments"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        hint: "PDFs, Word docs, spreadsheets, or images that visitors can download from this article. Each attachment becomes a labelled link at the bottom of the page."
        fields:
          - { name: "label", label: "Label shown to readers", widget: "string", hint: "E.g. 'Course details (PDF)' or 'Results spreadsheet'" }
          - { name: "file", label: "Upload file", widget: "file" }
          - name: "type"
            label: "File type"
            widget: "select"
            options:
              - { label: "PDF", value: "pdf" }
              - { label: "Word document", value: "docx" }
              - { label: "Spreadsheet", value: "xlsx" }
              - { label: "CSV", value: "csv" }
              - { label: "Image", value: "image" }
              - { label: "Other", value: "other" }
            default: "pdf"
            required: false
      - { name: "draft", label: "Draft (don't publish yet)", widget: "boolean", default: false, required: false }
      - { name: "featured", label: "Feature this article", widget: "boolean", default: false, required: false, hint: "Pins this article to the top of the news list and uses it as the featured article on the homepage. Use it to bring an older article back to prominence (e.g. a relevant guide that suits the current season). Only one is needed at a time — if you tick it on multiple, the most recent featured article wins on the homepage." }
      - { name: "body", label: "Article body", widget: "markdown" }

  # ─── MAPS ────────────────────────────────────────────────────────────────
  - name: "maps"
    label: "Maps"
    label_singular: "Map"
    description: "The map library — every venue PFO has surveyed."
    folder: "src/content/maps"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sort: "title:asc"
    fields:
      - { name: "title", label: "Map name", widget: "string", hint: "e.g. 'Hurstwood', 'Towneley Park'" }
      - { name: "nearTown", label: "Near town", widget: "string", required: false }
      - name: "terrain"
        label: "Terrain type"
        widget: "select"
        options:
          - { label: "Urban (streets, estates)", value: "urban" }
          - { label: "Parkland (parks, gardens)", value: "parkland" }
          - { label: "Forest (woodland, plantation)", value: "forest" }
          - { label: "Moorland (open hill)", value: "moorland" }
          - { label: "Mountain bike (MTBO)", value: "mtbo" }
          - { label: "Mixed terrain", value: "mixed" }
        default: "mixed"
      - { name: "scale", label: "Scale", widget: "string", required: false, hint: "e.g. '1:7500'" }
      - { name: "contourInterval", label: "Contour interval", widget: "string", required: false, hint: "e.g. '5m'" }
      - { name: "surveyYear", label: "Year last surveyed", widget: "number", required: false, value_type: "int", min: 1970, max: 2099 }
      - { name: "surveyor", label: "Surveyor / mapper", widget: "string", required: false }
      - { name: "permanentCourse", label: "Has permanent course (POC)", widget: "boolean", default: false, required: false }
      - name: "coords"
        label: "Coordinates"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { name: "lat", label: "Latitude", widget: "number", value_type: "float", step: 0.00001 }
          - { name: "lng", label: "Longitude", widget: "number", value_type: "float", step: 0.00001 }
      # NOTE: the map image is no longer rendered on the public site
      # (copyright sits with the individual surveyor). Field kept here for
      # internal records — and so we can re-enable rendering later if
      # licensing changes — but is now optional.
      - { name: "image", label: "Map image (internal only — not shown publicly)", widget: "image", required: false, hint: "Optional — for committee records. Not displayed on the live site." }
      - { name: "imageAlt", label: "Map image alt text", widget: "string", required: false }
      - { name: "routeGadgetUrl", label: "RouteGadget URL", widget: "string", required: false, hint: "Direct link to this area on RouteGadget — e.g. https://www.pfo.routegadget.co.uk/rg2/?map=42 — leave blank to fall back to the RG index." }
      - { name: "summary", label: "Card description", widget: "string", hint: "1-line description shown on the map library page." }
      - { name: "draft", label: "Draft (don't publish yet)", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Long-form description", widget: "markdown", required: false, hint: "Area history, access notes, parking, hazards, etc." }

  # ─── ANNOUNCEMENTS ───────────────────────────────────────────────────────
  - name: "announcements"
    label: "Announcements"
    label_singular: "Announcement"
    description: "Banner messages on the homepage. Used for last-minute event changes, weather warnings, AGM notices, etc. The banner shows only between the validFrom and validUntil dates."
    folder: "src/content/announcements"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} ({{validFrom | date('YYYY-MM-DD')}} → {{validUntil | date('YYYY-MM-DD')}})"
    sort: "validFrom:desc"
    fields:
      - { name: "title", label: "Internal title", widget: "string", hint: "For committee reference, not shown publicly. e.g. 'Brun Valley parking change'" }
      - { name: "message", label: "Banner message", widget: "text", hint: "1–2 sentences. Shown on the homepage between the dates below." }
      - { name: "validFrom",  label: "Show from",  widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "validUntil", label: "Show until", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - name: "severity"
        label: "Severity"
        widget: "select"
        default: "info"
        options:
          - { label: "Info (gold)",   value: "info" }
          - { label: "Warning (plum)", value: "warning" }
          - { label: "Urgent (red)",   value: "urgent" }
      - { name: "link",      label: "Link URL (optional)", widget: "string", required: false, hint: "If filled in, banner becomes clickable" }
      - { name: "linkLabel", label: "Link label",          widget: "string", required: false, hint: "e.g. 'See full details →'" }
      - { name: "published", label: "Published",           widget: "boolean", default: true }

  # ─── INFO PAGES ──────────────────────────────────────────────────────────
  - name: "infoPages"
    label: "Information pages"
    label_singular: "Information page"
    description: "Sub-pages of the Information hub — privacy, safeguarding, policies, and similar."
    folder: "src/content/info-pages"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sort: "section:asc"
    fields:
      - { name: "title", label: "Page title", widget: "string" }
      - { name: "summary", label: "1-line summary", widget: "string", hint: "Shown as the description on the info hub card." }
      - name: "section"
        label: "Hub section"
        widget: "select"
        options:
          - { label: "Governance", value: "governance" }
          - { label: "Safety", value: "safety" }
          - { label: "Participation", value: "participation" }
          - { label: "Members' resources", value: "members" }
          - { label: "Admin", value: "admin" }
        required: false
      - { name: "order", label: "Sort order within section", widget: "number", required: false, value_type: "int" }
      - { name: "lastReviewed", label: "Last reviewed", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, required: false }
      - { name: "draft", label: "Draft (don't publish yet)", widget: "boolean", default: false, required: false }
      - { name: "wideLayout", label: "Use full-width layout (for pages with wide tables)", widget: "boolean", default: false, required: false, hint: "Hides the right-hand 'Other information' sidebar and shows it as a small dropdown above the page instead. Use this when the page has wide tables — e.g. POC courses." }
      - name: "attachments"
        label: "File attachments"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        hint: "PDFs, Word docs, spreadsheets, or images that visitors can download. Each attachment becomes a labelled link at the bottom of the page."
        fields:
          - { name: "label", label: "Label shown to readers", widget: "string", hint: "E.g. 'Safeguarding policy (PDF)' or 'Membership form'" }
          - { name: "file", label: "Upload file", widget: "file" }
          - name: "type"
            label: "File type"
            widget: "select"
            options:
              - { label: "PDF", value: "pdf" }
              - { label: "Word document", value: "docx" }
              - { label: "Spreadsheet", value: "xlsx" }
              - { label: "CSV", value: "csv" }
              - { label: "Image", value: "image" }
              - { label: "Other", value: "other" }
            default: "pdf"
            required: false
      - { name: "body", label: "Page content", widget: "markdown" }
